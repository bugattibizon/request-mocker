<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Mocker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1117;
  color: #c9cde8;
  width: 420px;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: #181a2a;
  border-bottom: 1px solid #252840;
  flex-shrink: 0;
}
.logo { font-size: 18px; }
.title { font-size: 14px; font-weight: 600; color: #fff; flex: 1; }
.title span { color: #7b6cf6; }
.count { font-size: 11px; color: #555775; }

/* ── Toggle switch ── */
.toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle input { display: none; }
.track {
  position: absolute; inset: 0;
  background: #2e3050; border-radius: 10px;
  cursor: pointer; transition: background .2s;
}
.track::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  left: 3px; top: 3px;
  background: #fff; border-radius: 50%;
  transition: transform .2s;
}
.toggle input:checked + .track { background: #7b6cf6; }
.toggle input:checked + .track::before { transform: translateX(16px); }

/* ── Views ── */
.view { display: flex; flex-direction: column; }
.view.hidden { display: none; }

/* ── Rule list ── */
.list { max-height: 460px; overflow-y: auto; padding: 8px; }
.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-thumb { background: #2e3050; border-radius: 2px; }

.empty {
  padding: 40px 16px;
  text-align: center;
  color: #40435e;
  font-size: 13px;
  line-height: 2;
}
.empty-icon { font-size: 30px; margin-bottom: 4px; }

.rule {
  background: #181a2a;
  border: 1px solid #252840;
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color .15s, opacity .15s;
}
.rule:hover { border-color: #7b6cf6; }
.rule.disabled { opacity: 0.38; }

.rule-body { flex: 1; min-width: 0; }
.rule-name {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px; color: #e0e3ff;
}
.rule-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-bottom: 2px; }
.rule-url {
  font-size: 11px; color: #40435e;
  font-family: monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* method badges */
.badge { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; }
.m-GET    { background: #0d2e1c; color: #4dffaa; }
.m-POST   { background: #2e1d0d; color: #ffad4d; }
.m-PUT    { background: #1d0d2e; color: #b64dff; }
.m-DELETE { background: #2e0d0d; color: #ff4d4d; }
.m-PATCH  { background: #0d1d2e; color: #4db5ff; }
.m-ANY    { background: #1a1e1a; color: #99ff99; }

.status { font-size: 10px; font-weight: 700; font-family: monospace; }
.s-ok   { color: #4dffaa; }
.s-warn { color: #ffad4d; }
.s-err  { color: #ff4d4d; }
.meta-text { font-size: 10px; color: #40435e; }

.rule-actions { display: flex; gap: 2px; flex-shrink: 0; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: #40435e; padding: 4px 5px; border-radius: 4px;
  font-size: 13px; line-height: 1;
  transition: color .15s, background .15s;
}
.icon-btn:hover { background: #252840; color: #c9cde8; }
.icon-btn.danger:hover { color: #ff4d4d; }

/* ── Footer ── */
.footer {
  display: flex; gap: 6px;
  padding: 8px 10px;
  border-top: 1px solid #252840;
  background: #181a2a;
}
.btn {
  padding: 7px 12px;
  border: none; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: background .15s;
}
.btn-primary { background: #7b6cf6; color: #fff; flex: 1; }
.btn-primary:hover { background: #6a5be0; }
.btn-ghost { background: #252840; color: #c9cde8; }
.btn-ghost:hover { background: #2e3050; }

/* ── Form view ── */
.form-scroll { max-height: 500px; overflow-y: auto; padding: 12px 14px; }
.form-scroll::-webkit-scrollbar { width: 4px; }
.form-scroll::-webkit-scrollbar-thumb { background: #2e3050; border-radius: 2px; }
.form-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 14px; }

.field { margin-bottom: 10px; }
.label {
  display: block;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px;
  color: #555775; margin-bottom: 4px;
}
.row { display: flex; gap: 8px; }
.row .field { flex: 1; }

input[type=text], input[type=number], select, textarea {
  width: 100%;
  background: #0f1117;
  border: 1px solid #252840;
  color: #c9cde8;
  border-radius: 6px;
  padding: 6px 9px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: #7b6cf6; }
textarea { resize: vertical; min-height: 64px; font-family: monospace; font-size: 12px; }
select option { background: #181a2a; }

.checkbox-row {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; color: #888ab0; cursor: pointer;
}
.checkbox-row input { width: 14px; height: 14px; accent-color: #7b6cf6; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">⚡</span>
  <span class="title">Request <span>Mocker</span></span>
  <span class="count" id="count"></span>
  <label class="toggle" title="Enable / disable all mocks">
    <input type="checkbox" id="globalToggle">
    <span class="track"></span>
  </label>
</div>

<!-- List view -->
<div class="view" id="viewList">
  <div class="list" id="ruleList">
    <div class="empty" id="empty">
      <div class="empty-icon">⚡</div>
      <div>No mock rules yet</div>
      <div style="font-size:11px;color:#2e3050">Click "+ Add Rule" to get started</div>
    </div>
  </div>
  <div class="footer">
    <button class="btn btn-primary" id="btnAdd">+ Add Rule</button>
  </div>
</div>

<!-- Form view -->
<div class="view hidden" id="viewForm">
  <div class="form-scroll">
    <div class="form-title" id="formTitle">New Mock Rule</div>

    <div class="field">
      <label class="label">Name (optional)</label>
      <input type="text" id="fName" placeholder="e.g. Mock user list">
    </div>

    <div class="row">
      <div class="field">
        <label class="label">Method</label>
        <select id="fMethod">
          <option value="*">ANY</option>
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="PATCH">PATCH</option>
          <option value="DELETE">DELETE</option>
          <option value="HEAD">HEAD</option>
        </select>
      </div>
      <div class="field">
        <label class="label">Status</label>
        <input type="number" id="fStatus" value="200" min="100" max="599">
      </div>
      <div class="field">
        <label class="label">Delay (ms)</label>
        <input type="number" id="fDelay" value="0" min="0">
      </div>
    </div>

    <div class="field">
      <label class="label">URL Pattern</label>
      <input type="text" id="fUrl" placeholder="/api/users  or  https://api.example.com/.*">
    </div>

    <div class="field">
      <label class="checkbox-row">
        <input type="checkbox" id="fRegex"> Treat as RegExp
      </label>
    </div>

    <div class="field">
      <label class="label">Response Body</label>
      <textarea id="fBody" placeholder='{"data": [], "ok": true}'></textarea>
    </div>

    <div class="field">
      <label class="label">Response Headers (JSON)</label>
      <textarea id="fHeaders" style="min-height:48px" placeholder='{"Content-Type": "application/json"}'></textarea>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-ghost" id="btnCancel">Cancel</button>
    <button class="btn btn-primary" id="btnSave">Save Rule</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>

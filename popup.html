<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Mocker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Light mode: Postman-inspired — white surfaces, very subtle structure ── */
:root {
  --bg:       #f5f5f5;   /* outer shell — barely-there gray behind white panels */
  --surface:  #ffffff;   /* cards, panels, inputs, header — pure white */
  --surface2: #fafafa;   /* line numbers, secondary inputs — nearly white, distinct from surface */
  --border:   #e8e8e8;   /* very light borders — guide without drawing attention */
  --text:     #1a1a1a;   /* primary — deep but not pure black */
  --text-sec: #6b6b6b;   /* labels, meta — readable mid-gray */
  --text-dim: #a3a3a3;   /* placeholders, disabled — clearly subordinate */
  --text-mid: #3d3d3d;   /* medium-emphasis text */
  --track:    #c8c8c8;   /* toggle track, scrollbar */
  --hover:    #f0f0f0;   /* hover — perceptibly lighter than --bg */
  --c-dim:    #c8c8c8;   /* very dim indicators */
}

/* ── Dark mode: layered dark grays, never pure black ── */
body.dark {
  --bg:       #1e1e1e;   /* main background — darkest layer */
  --surface:  #252525;   /* panels, cards, inputs — one step up */
  --surface2: #1a1a1a;   /* line numbers, secondary inputs — one step down from bg */
  --border:   #404040;   /* borders — visible but not harsh */
  --text:     #eeeeee;   /* primary — off-white, easier on eyes than pure white */
  --text-sec: #9e9e9e;   /* secondary labels */
  --text-dim: #616161;   /* placeholders, muted elements */
  --text-mid: #b0b0b0;   /* medium emphasis */
  --track:    #4a4a4a;   /* toggle track, scrollbar — brighter than border */
  --hover:    #2e2e2e;   /* hover — between bg and surface */
  --c-dim:    #4a4a4a;   /* dim indicators */
}

html, body { overflow: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: var(--bg);
  color: var(--text);
  width: 800px;
  height: 600px;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
/* ── Header tabs (pill style) ── */
.hdr-tabs { display:flex; gap:2px; flex:1; margin:0 12px; }
.hdr-tab { padding:6px 14px; font-size:12px; font-weight:600; color:var(--text-sec); background:none; border:none; border-radius:20px; cursor:pointer; transition:color .15s,background .15s; }
.hdr-tab:hover { color:var(--text); background:var(--hover); }
.hdr-tab.active { color:#1090D4; background:#e3f2fc; }
body.dark .hdr-tab.active { background:#0d3650; }

.tab-count { display:inline-block; font-size:10px; font-weight:700; padding:1px 6px; border-radius:20px; margin-left:5px; vertical-align:middle; background:var(--hover); color:var(--text-sec); transition:background .15s,color .15s; }
.tab-count:empty { display:none; }
.hdr-tab.active .tab-count { background:#cde9f8; color:#1090D4; }
body.dark .hdr-tab.active .tab-count { background:#0d3650; color:#1090D4; }

/* ── Toggle switch ── */
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { display: none; }
.track {
  position: absolute; inset: 0;
  background: var(--track); border-radius: 11px;
  cursor: pointer; transition: background .2s;
}
.track::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: #fff; border-radius: 50%;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
  transition: transform .2s;
}
.toggle input:checked + .track { background: #1090D4; }
.toggle input:checked + .track::before { transform: translateX(18px); }

/* Small toggle variant used inside list rows */
.toggle-sm { width: 34px; height: 20px; }
.toggle-sm .track::before { width: 14px; height: 14px; left: 3px; top: 3px; }
.toggle-sm input:checked + .track::before { transform: translateX(14px); }

/* ── Views ── */
.view { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

/* ── Global thin scrollbars ── */
* { scrollbar-width: thin; scrollbar-color: var(--track) transparent; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--track); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ── Rule list ── */
.list { flex: 1; min-height: 0; overflow-y: auto; padding: 12px; }

.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 2.4;
}

.rule {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 15px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color .15s, box-shadow .15s, opacity .15s;
}
.rule { cursor: pointer; }
.rule:hover { border-color: #1090D4; box-shadow: 0 2px 10px rgba(16,144,212,.08); }
.rule.disabled { opacity: 0.45; }

.rule-body { flex: 1; min-width: 0; }
.rule-name {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 5px; color: var(--text);
}
.rule-meta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
.rule-url {
  font-size: 11px; color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* method badges */
.badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
.m-GET    { background: #e0fff2; color: #00875a; }
.m-POST   { background: #fff4e0; color: #b76000; }
.m-PUT    { background: #f0e8ff; color: #6c5ce7; }
.m-DELETE { background: #ffe8e8; color: #cc0000; }
.m-PATCH  { background: #e0f4ff; color: #0066b8; }
.m-ANY    { background: var(--hover); color: var(--text-sec); }

.status { font-size: 12px; font-weight: 700; }
.s-ok   { color: #00875a; }
.s-warn { color: #b76000; }
.s-err  { color: #cc0000; }
.meta-text { font-size: 11px; color: var(--text-sec); }

.rule-actions { display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); padding: 6px 7px; border-radius: 6px;
  font-size: 15px; line-height: 1;
  transition: color .15s, background .15s;
}
.icon-btn:hover { background: var(--hover); color: var(--text); }
.icon-btn.danger:hover { background: #ffe8e8; color: #cc0000; }
body.dark .icon-btn.danger:hover { background: #3a1a1a; }

/* ── Inject headers panel ── */
.ih-panel { flex:1; min-height:0; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:6px; }

/* ── Shared key:value row (inject headers + response headers) ── */
.ih-row, .rh-row { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px 10px; }
.ih-row:hover, .rh-row:hover { border-color:#1090D4; }
.ih-cell { flex:1; min-width:0; background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:3px 8px; transition:border-color .15s,background .15s; }
.ih-cell input[type=text] { width:100%; border:none; outline:none; font-size:13px; color:var(--text); background:transparent; min-width:0; box-shadow:none; padding:0; }
.ih-cell:focus-within { border-color:#1090D4; background:var(--surface); }
.ih-sep { color:var(--text-dim); font-size:13px; font-weight:600; flex-shrink:0; }

/* Response headers list inside tab panel */
.rh-list { flex:1; min-height:0; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:6px; }

/* ── Footer ── */
.footer {
  display: flex; gap: 10px;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.btn {
  padding: 10px 18px;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: background .15s, box-shadow .15s;
}
.btn-primary { background: #1090D4; color: #fff; flex: 1; }
.btn-primary:hover { background: #0878b8; box-shadow: 0 4px 12px rgba(16,144,212,.35); }
.btn-ghost { background: var(--hover); color: var(--text-mid); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }

/* ── Form view ── */
.form-top { padding: 12px 16px 8px; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); }
.form-title { font-size: 15px; font-weight: 700; color: var(--text); }

/* ── Tabs ── */
.tab-bar { display:flex; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; padding:0 12px; }
.tab-btn { padding:8px 14px; font-size:12px; font-weight:600; color:var(--text-sec); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; margin-bottom:-1px; transition:color .15s,border-color .15s; }
.tab-btn:hover { color:var(--text-mid); }
.tab-btn.active { color:#1090D4; border-bottom-color:#1090D4; }
.tab-panels { flex:1; min-height:0; overflow:hidden; }
.tab-panel { display:none; height:100%; flex-direction:column; overflow:hidden; }
.tab-panel.active { display:flex; }
.tab-toolbar { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface); }
.tab-panel .je { flex:1; min-height:0; border:none; border-radius:0; }
.tab-panel .je-ta { height:100%; min-height:0; }
.tab-panel .je-wrap { min-height:0; height:auto; }
.draft-badge {
  font-size: 11px; font-weight: 600;
  background: #fff4e0; color: #b76000;
  padding: 3px 9px; border-radius: 20px;
}

.field { margin-bottom: 8px; }
.label {
  display: block;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px;
  color: var(--text-sec); margin-bottom: 4px;
}
.row { display: flex; gap: 10px; }
.row .field { flex: 1; }

input[type=text], input[type=number], select, textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  line-height: 1.2;
  outline: none;
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
}
input[type=text], input[type=number], select { height: 32px; }
input:focus, select:focus, textarea:focus {
  border-color: #1090D4;
  box-shadow: 0 0 0 3px rgba(16,144,212,.12);
}
textarea {
  resize: vertical;
  min-height: 80px;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
}
select option { background: var(--surface); color: var(--text); }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

.checkbox-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-mid); cursor: pointer;
}
.checkbox-row input { width: 13px; height: 13px; accent-color: #1090D4; cursor: pointer; }

.btn-tool {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-mid);
  cursor: pointer; transition: background .15s;
  white-space: nowrap;
}
.btn-tool:hover { background: var(--border); }
.btn-tool.copied { color: #00875a; }

/* ── Method dropdown ── */
.method-wrap { position:relative; flex:none; }
.method-btn { width:100%; display:flex; align-items:center; justify-content:space-between; gap:5px; padding:6px 10px; height:32px; border:1px solid var(--border); border-radius:6px; background:var(--surface); cursor:pointer; font-size:13px; font-weight:700; letter-spacing:.4px; transition:border-color .15s; white-space:nowrap; }
.method-btn:hover { border-color:#1090D4; }
.method-btn:focus { border-color:#1090D4; outline:none; box-shadow:0 0 0 3px rgba(16,144,212,.12); }
.method-btn svg { flex-shrink:0; opacity:.5; }
.method-drop { position:absolute; top:calc(100% + 4px); left:0; z-index:200; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,.12); min-width:100%; overflow:hidden; display:none; }
body.dark .method-drop { box-shadow:0 6px 24px rgba(0,0,0,.5); }
.method-drop.open { display:block; }
.method-opt { display:block; width:100%; padding:7px 14px; border:none; background:none; text-align:left; font-size:12px; font-weight:700; cursor:pointer; letter-spacing:.4px; transition:background .1s; }
.method-opt:hover { background:var(--hover); }
.mc-get    { color:#00875a; }
.mc-post   { color:#b76000; }
.mc-put    { color:#7c5ce7; }
.mc-delete { color:#cc0000; }
.mc-patch  { color:#0066b8; }
.mc-head, .mc-any { color:var(--text-sec); }

.json-status { font-size: 11px; margin-top: 5px; min-height: 16px; font-weight: 500; }
.json-ok  { color: #00875a; }
.json-err { color: #cc0000; }

/* ── JSON editor ── */
.je { display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; background:var(--surface); transition:border-color .15s,box-shadow .15s; }
.je:focus-within { border-color:#1090D4; box-shadow:0 0 0 3px rgba(16,144,212,.12); }
.je-nums { padding:7px 8px; background:var(--surface2); border-right:1px solid var(--border); text-align:right; color:var(--text-dim); font-family:'Menlo', 'Consolas', monospace; font-size:11px; line-height:1.6; user-select:none; min-width:30px; white-space:pre; overflow:hidden; }
.je-wrap { position:relative; flex:1; min-width:0; }
#viewEditor .je-wrap { height:100%; min-height:0; }
.search-bar { display:none; align-items:center; gap:8px; padding:6px 14px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.search-bar.open { display:flex; }
.search-bar input { flex:1; padding:4px 8px; border:1px solid var(--border); border-radius:5px; font-size:12px; outline:none; font-family:inherit; background:var(--surface); color:var(--text); }
.search-bar input:focus { border-color:#1090D4; }
.search-count { font-size:11px; color:var(--text-sec); white-space:nowrap; min-width:32px; }
.search-nav { background:none; border:none; cursor:pointer; color:var(--text-sec); padding:2px 5px; border-radius:4px; font-size:13px; line-height:1; }
.search-nav:hover { background:var(--hover); color:var(--text); }
.je-hl { position:absolute; inset:0; padding:7px 10px; font-family:'Menlo', 'Consolas', monospace; font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-all; overflow:hidden; pointer-events:none; background:var(--surface); }
.je-ta { display:block; width:100%; height:100%; min-height:90px; padding:7px 10px; background:transparent; color:transparent; caret-color:var(--text); border:none; border-radius:0; outline:none; resize:none; font-family:'Menlo', 'Consolas', monospace; font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-all; overflow:auto; position:relative; z-index:1; }
.je-ta::selection { background:rgba(16,144,212,.2); }
/* Light mode: VS Code-inspired */
.jk { color:#0451A5; } .jv { color:#A31515; } .jn { color:#098658; } .jb { color:#0000FF; } .jp { color:var(--text-sec); }
/* Dark mode: Postman/Monaco-inspired */
body.dark .jk { color:#9cdcfe; }
body.dark .jv { color:#ce9178; }
body.dark .jn { color:var(--text); }
body.dark .jb { color:#569cd6; }
body.dark .jp { color:var(--text-sec); }
</style>
</head>
<body>

<div class="header">
  <div class="hdr-tabs">
    <button type="button" class="hdr-tab active" data-lt="rules">Mock Rules<span class="tab-count" id="countRules"></span></button>
    <button type="button" class="hdr-tab" data-lt="headers">Inject Headers<span class="tab-count" id="countHeaders"></span></button>
  </div>
  <button type="button" class="icon-btn" id="btnTheme" title="Toggle dark mode" style="padding:5px 7px;display:flex;align-items:center"></button>
  <label class="toggle" title="Enable / disable all mocks">
    <input type="checkbox" id="globalToggle">
    <span class="track"></span>
  </label>
</div>

<!-- List view -->
<div class="view" id="viewList" style="display:flex">
  <div class="list" id="ruleList">
    <div class="empty" id="empty">
      <div>No mock rules yet</div>
      <div style="font-size:12px;color:var(--c-dim)">Click "+ Add Rule" to get started</div>
    </div>
  </div>
  <div class="ih-panel" id="ihPanel" style="display:none"></div>
  <div class="footer">
    <button class="btn btn-primary" id="btnAdd">+ Add Rule</button>
    <button class="btn btn-primary" id="btnAddHeader" style="display:none">+ Add Header</button>
  </div>
</div>

<!-- Form view -->
<div class="view" id="viewForm" style="display:none">

  <!-- Top: identity + URL + method row -->
  <div class="form-top">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span class="form-title" id="formTitle">New Mock Rule</span>
    </div>
    <div class="row" style="align-items:flex-start;gap:8px">
      <div class="field" style="flex:1;min-width:0">
        <label class="label">Name (optional)</label>
        <input type="text" id="fName" placeholder="e.g. Mock user list">
      </div>
      <div class="field" style="flex:none">
        <label class="label">Method</label>
        <div class="method-wrap" id="methodWrap">
          <button type="button" class="method-btn mc-get" id="fMethodBtn">
            <span>GET</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="method-drop" id="fMethodDrop">
            <button type="button" class="method-opt mc-any" data-val="*">ANY</button>
            <button type="button" class="method-opt mc-get" data-val="GET">GET</button>
            <button type="button" class="method-opt mc-post" data-val="POST">POST</button>
            <button type="button" class="method-opt mc-put" data-val="PUT">PUT</button>
            <button type="button" class="method-opt mc-patch" data-val="PATCH">PATCH</button>
            <button type="button" class="method-opt mc-delete" data-val="DELETE">DELETE</button>
            <button type="button" class="method-opt mc-head" data-val="HEAD">HEAD</button>
          </div>
          <input type="hidden" id="fMethod" value="GET">
        </div>
      </div>
      <div class="field" style="width:58px;flex:none">
        <label class="label">Status</label>
        <input type="number" id="fStatus" value="200" min="100" max="599">
      </div>
      <div class="field" style="width:62px;flex:none">
        <label class="label">Delay ms</label>
        <input type="number" id="fDelay" value="0" min="0">
      </div>
    </div>
    <div class="field">
      <label class="label">URL Pattern</label>
      <input type="text" id="fUrl" placeholder="/api/users  or  https://api.example.com/.*">
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button type="button" class="tab-btn active" data-tab="response">Response</button>
    <button type="button" class="tab-btn" data-tab="request">Request</button>
    <button type="button" class="tab-btn" data-tab="headers">Headers</button>
  </div>

  <!-- Tab panels -->
  <div class="tab-panels">

    <!-- Response tab -->
    <div class="tab-panel active" id="tabResponse">
      <div class="tab-toolbar">
        <div class="json-status" id="jsonStatus"></div>
        <div style="display:flex;gap:6px">
          <button type="button" class="btn-tool" id="btnSearchBody" title="Find (Ctrl+F)">⌕ Find</button>
          <button type="button" class="btn-tool" id="btnFormat">Format</button>
          <button type="button" class="btn-tool" id="btnCopyResp">Copy</button>
          <button type="button" class="btn-tool" id="btnExpand">↗ Expand</button>
        </div>
      </div>
      <div class="je">
        <div class="je-nums" id="bodyNums">1</div>
        <div class="je-wrap">
          <div class="je-hl" id="bodyHL" aria-hidden="true"></div>
          <textarea id="fBody" class="je-ta" spellcheck="false" placeholder='{"data": [], "ok": true}'></textarea>
        </div>
      </div>
    </div>

    <!-- Request tab -->
    <div class="tab-panel" id="tabRequest">
      <div class="tab-toolbar">
        <div class="json-status" id="jsonStatusReq"></div>
        <div style="display:flex;gap:6px">
          <button type="button" class="btn-tool" id="btnSearchReq" title="Find (Ctrl+F)">⌕ Find</button>
          <button type="button" class="btn-tool" id="btnFormatReq">Format</button>
          <button type="button" class="btn-tool" id="btnCopyReq">Copy</button>
          <button type="button" class="btn-tool" id="btnExpandReq">↗ Expand</button>
        </div>
      </div>
      <div class="je">
        <div class="je-nums" id="reqBodyNums">1</div>
        <div class="je-wrap">
          <div class="je-hl" id="reqBodyHL" aria-hidden="true"></div>
          <textarea id="fReqBody" class="je-ta" spellcheck="false" placeholder="Match requests whose body contains this (leave empty to match all)"></textarea>
        </div>
      </div>
    </div>

    <!-- Headers tab -->
    <div class="tab-panel" id="tabHeaders">
      <div class="tab-toolbar">
        <span class="label" style="margin-bottom:0">Response Headers</span>
        <button type="button" class="btn-tool" id="btnAddRH">+ Add</button>
      </div>
      <div class="rh-list" id="rhList"></div>
    </div>

  </div>

  <div class="search-bar" id="formSearch">
    <input type="text" id="formSearchInput" placeholder="Find…" autocomplete="off">
    <span class="search-count" id="formSearchCount"></span>
    <button type="button" class="search-nav" id="formSearchPrev" title="Previous">↑</button>
    <button type="button" class="search-nav" id="formSearchNext" title="Next">↓</button>
    <button type="button" class="search-nav" id="formSearchClose" title="Close">✕</button>
  </div>

  <div class="footer">
    <button type="button" class="btn btn-ghost" id="btnBack">← Back</button>
  </div>
</div>

<!-- Editor view (fullscreen body editor) -->
<div class="view" id="viewEditor" style="display:none;flex-direction:column">
  <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
    <button type="button" class="btn btn-ghost" id="btnEditorBack">← Back</button>
    <span id="editorTitle" style="font-size:14px;font-weight:700;color:var(--text);flex:1">Response Body</span>
    <button type="button" class="btn-tool" id="btnEditorFormat">Format</button>
    <button type="button" class="btn-tool" id="btnEditorCopy">Copy</button>
    <div class="json-status" id="jsonStatusEditor" style="margin-top:0;margin-left:6px"></div>
    <button type="button" class="btn-tool" id="btnEditorSearch" title="Search (Ctrl+F)">⌕ Find</button>
  </div>
  <div class="search-bar" id="editorSearch">
    <input type="text" id="searchInput" placeholder="Find in body…" autocomplete="off">
    <span class="search-count" id="searchCount"></span>
    <button type="button" class="search-nav" id="searchPrev" title="Previous">↑</button>
    <button type="button" class="search-nav" id="searchNext" title="Next">↓</button>
    <button type="button" class="search-nav" id="searchClose" title="Close">✕</button>
  </div>
  <div class="je" style="flex:1;min-height:0;border:none;border-radius:0">
    <div class="je-nums" id="editorNums">1</div>
    <div class="je-wrap">
      <div class="je-hl" id="editorHL" aria-hidden="true"></div>
      <textarea id="fBodyEditor" class="je-ta" spellcheck="false"
        style="min-height:0;height:100%"
        placeholder='{"data": [], "ok": true}'></textarea>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>

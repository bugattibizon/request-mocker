<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Mocker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f5fb;
  color: #1e1f36;
  width: 800px;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  background: #fff;
  border-bottom: 1px solid #e4e6f0;
  flex-shrink: 0;
}
.logo { font-size: 22px; }
.title { font-size: 16px; font-weight: 700; color: #1e1f36; flex: 1; }
.title span { color: #6c5ce7; }
.count { font-size: 12px; color: #9b9db8; font-weight: 500; }

/* ── Toggle switch ── */
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { display: none; }
.track {
  position: absolute; inset: 0;
  background: #d1d3e8; border-radius: 11px;
  cursor: pointer; transition: background .2s;
}
.track::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: #fff; border-radius: 50%;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
  transition: transform .2s;
}
.toggle input:checked + .track { background: #6c5ce7; }
.toggle input:checked + .track::before { transform: translateX(18px); }

/* ── Views ── */
.view { display: flex; flex-direction: column; }

/* ── Rule list ── */
.list { max-height: 560px; overflow-y: auto; padding: 12px; }
.list::-webkit-scrollbar { width: 5px; }
.list::-webkit-scrollbar-thumb { background: #d1d3e8; border-radius: 3px; }

.empty {
  padding: 60px 20px;
  text-align: center;
  color: #b0b2cc;
  font-size: 14px;
  line-height: 2.4;
}
.empty-icon { font-size: 40px; margin-bottom: 8px; }

.rule {
  background: #fff;
  border: 1px solid #e4e6f0;
  border-radius: 10px;
  padding: 13px 15px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color .15s, box-shadow .15s, opacity .15s;
}
.rule:hover { border-color: #6c5ce7; box-shadow: 0 2px 10px rgba(108,92,231,.08); }
.rule.disabled { opacity: 0.45; }

.rule-body { flex: 1; min-width: 0; }
.rule-name {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 5px; color: #1e1f36;
}
.rule-meta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
.rule-url {
  font-size: 11px; color: #b0b2cc;
  font-family: monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* method badges */
.badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
.m-GET    { background: #e0fff2; color: #00875a; }
.m-POST   { background: #fff4e0; color: #b76000; }
.m-PUT    { background: #f0e8ff; color: #6c5ce7; }
.m-DELETE { background: #ffe8e8; color: #cc0000; }
.m-PATCH  { background: #e0f4ff; color: #0066b8; }
.m-ANY    { background: #f0f0f0; color: #555; }

.status { font-size: 12px; font-weight: 700; font-family: monospace; }
.s-ok   { color: #00875a; }
.s-warn { color: #b76000; }
.s-err  { color: #cc0000; }
.meta-text { font-size: 11px; color: #9b9db8; }

.rule-actions { display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: #b0b2cc; padding: 6px 7px; border-radius: 6px;
  font-size: 15px; line-height: 1;
  transition: color .15s, background .15s;
}
.icon-btn:hover { background: #f0f1fa; color: #1e1f36; }
.icon-btn.danger:hover { background: #ffe8e8; color: #cc0000; }

/* ── Footer ── */
.footer {
  display: flex; gap: 10px;
  padding: 14px 16px;
  border-top: 1px solid #e4e6f0;
  background: #fff;
}
.btn {
  padding: 10px 18px;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: background .15s, box-shadow .15s;
}
.btn-primary { background: #6c5ce7; color: #fff; flex: 1; }
.btn-primary:hover { background: #5a4bd1; box-shadow: 0 4px 12px rgba(108,92,231,.3); }
.btn-ghost { background: #f0f1fa; color: #4a4c6a; border: 1px solid #e4e6f0; }
.btn-ghost:hover { background: #e4e6f0; }

/* ── Form view ── */
.form-scroll { overflow-y: auto; padding: 20px; max-height: 640px; }
.form-scroll::-webkit-scrollbar { width: 5px; }
.form-scroll::-webkit-scrollbar-thumb { background: #d1d3e8; border-radius: 3px; }

.form-title { font-size: 16px; font-weight: 700; color: #1e1f36; }
.draft-badge {
  font-size: 11px; font-weight: 600;
  background: #fff4e0; color: #b76000;
  padding: 3px 9px; border-radius: 20px;
}

.field { margin-bottom: 16px; }
.label {
  display: block;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px;
  color: #9b9db8; margin-bottom: 6px;
}
.row { display: flex; gap: 12px; }
.row .field { flex: 1; }

input[type=text], input[type=number], select, textarea {
  width: 100%;
  background: #fff;
  border: 1px solid #e4e6f0;
  color: #1e1f36;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
}
input:focus, select:focus, textarea:focus {
  border-color: #6c5ce7;
  box-shadow: 0 0 0 3px rgba(108,92,231,.12);
}
textarea {
  resize: vertical;
  min-height: 160px;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
}
textarea.small { min-height: 72px; }
select option { background: #fff; color: #1e1f36; }

.checkbox-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: #4a4c6a; cursor: pointer;
}
.checkbox-row input { width: 16px; height: 16px; accent-color: #6c5ce7; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">⚡</span>
  <span class="title">Request <span>Mocker</span></span>
  <span class="count" id="count"></span>
  <label class="toggle" title="Enable / disable all mocks">
    <input type="checkbox" id="globalToggle">
    <span class="track"></span>
  </label>
</div>

<!-- List view -->
<div class="view" id="viewList" style="display:flex">
  <div class="list" id="ruleList">
    <div class="empty" id="empty">
      <div class="empty-icon">⚡</div>
      <div>No mock rules yet</div>
      <div style="font-size:12px;color:#c8cadf">Click "+ Add Rule" to get started</div>
    </div>
  </div>
  <div class="footer">
    <button class="btn btn-primary" id="btnAdd">+ Add Rule</button>
  </div>
</div>

<!-- Form view -->
<div class="view" id="viewForm" style="display:none">
  <div class="form-scroll">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <span class="form-title" id="formTitle">New Mock Rule</span>
      <span class="draft-badge" id="draftBadge" style="display:none">draft restored</span>
    </div>

    <div class="field">
      <label class="label">Name (optional)</label>
      <input type="text" id="fName" placeholder="e.g. Mock user list">
    </div>

    <div class="row">
      <div class="field">
        <label class="label">Method</label>
        <select id="fMethod">
          <option value="*">ANY</option>
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="PATCH">PATCH</option>
          <option value="DELETE">DELETE</option>
          <option value="HEAD">HEAD</option>
        </select>
      </div>
      <div class="field">
        <label class="label">Status</label>
        <input type="number" id="fStatus" value="200" min="100" max="599">
      </div>
      <div class="field">
        <label class="label">Delay (ms)</label>
        <input type="number" id="fDelay" value="0" min="0">
      </div>
    </div>

    <div class="field">
      <label class="label">URL Pattern</label>
      <input type="text" id="fUrl" placeholder="/api/users  or  https://api.example.com/.*">
    </div>

    <div class="field">
      <label class="checkbox-row">
        <input type="checkbox" id="fRegex"> Treat as RegExp
      </label>
    </div>

    <div class="field">
      <label class="label">Response Body</label>
      <textarea id="fBody" placeholder='{"data": [], "ok": true}'></textarea>
    </div>

    <div class="field">
      <label class="label">Response Headers (JSON)</label>
      <textarea id="fHeaders" class="small" placeholder='{"Content-Type": "application/json"}'></textarea>
    </div>
  </div>

  <div class="footer">
    <button type="button" class="btn btn-ghost" id="btnCancel">Cancel</button>
    <button type="button" class="btn btn-primary" id="btnSave">Save Rule</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>

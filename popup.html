<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Mocker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f1117;
  color: #c9cde8;
  width: 420px;
  max-height: 580px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: #181a2a;
  border-bottom: 1px solid #252840;
  flex-shrink: 0;
}
.logo { font-size: 18px; }
.title { font-size: 14px; font-weight: 600; color: #fff; flex: 1; }
.title span { color: #7b6cf6; }
.count { font-size: 11px; color: #555775; }

/* ── Toggle switch ── */
.toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle input { display: none; }
.track {
  position: absolute; inset: 0;
  background: #2e3050; border-radius: 10px;
  cursor: pointer; transition: background .2s;
}
.track::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  left: 3px; top: 3px;
  background: #fff; border-radius: 50%;
  transition: transform .2s;
}
.toggle input:checked + .track { background: #7b6cf6; }
.toggle input:checked + .track::before { transform: translateX(16px); }

/* ── Rule list ── */
.list { flex: 1; overflow-y: auto; padding: 8px; }
.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-thumb { background: #2e3050; border-radius: 2px; }

.empty {
  padding: 40px 16px;
  text-align: center;
  color: #40435e;
  font-size: 13px;
  line-height: 2;
}
.empty-icon { font-size: 30px; margin-bottom: 4px; }

.rule {
  background: #181a2a;
  border: 1px solid #252840;
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color .15s, opacity .15s;
}
.rule:hover { border-color: #7b6cf6; }
.rule.disabled { opacity: 0.38; }

.rule-body { flex: 1; min-width: 0; }
.rule-name {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px; color: #e0e3ff;
}
.rule-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-bottom: 2px; }
.rule-url {
  font-size: 11px; color: #40435e;
  font-family: monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* method badges */
.badge {
  font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: 3px;
}
.m-GET    { background: #0d2e1c; color: #4dffaa; }
.m-POST   { background: #2e1d0d; color: #ffad4d; }
.m-PUT    { background: #1d0d2e; color: #b64dff; }
.m-DELETE { background: #2e0d0d; color: #ff4d4d; }
.m-PATCH  { background: #0d1d2e; color: #4db5ff; }
.m-ANY    { background: #1a1e1a; color: #99ff99; }

/* status badge */
.status {
  font-size: 10px; font-weight: 700;
  font-family: monospace;
}
.s-ok   { color: #4dffaa; }
.s-warn { color: #ffad4d; }
.s-err  { color: #ff4d4d; }

.meta-text { font-size: 10px; color: #40435e; }

/* rule action buttons */
.rule-actions { display: flex; gap: 2px; flex-shrink: 0; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: #40435e; padding: 4px 5px; border-radius: 4px;
  font-size: 13px; line-height: 1;
  transition: color .15s, background .15s;
}
.icon-btn:hover { background: #252840; color: #c9cde8; }
.icon-btn.danger:hover { color: #ff4d4d; }

/* ── Footer ── */
.footer {
  display: flex; gap: 6px;
  padding: 8px 10px;
  border-top: 1px solid #252840;
  background: #181a2a;
  flex-shrink: 0;
}
.btn {
  padding: 7px 12px;
  border: none; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: background .15s;
}
.btn-primary { background: #7b6cf6; color: #fff; flex: 1; }
.btn-primary:hover { background: #6a5be0; }
.btn-ghost { background: #252840; color: #c9cde8; }
.btn-ghost:hover { background: #2e3050; }

/* ── Modal overlay ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 100;
  overflow-y: auto;
  padding: 10px;
  align-items: flex-start;
  justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: #181a2a;
  border: 1px solid #252840;
  border-radius: 10px;
  width: 100%; max-width: 400px;
  padding: 16px;
  margin: auto;
}
.modal-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 14px; }

.field { margin-bottom: 10px; }
.label {
  display: block;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px;
  color: #555775; margin-bottom: 4px;
}
.row { display: flex; gap: 8px; }
.row .field { flex: 1; }

input[type=text], input[type=number], select, textarea {
  width: 100%;
  background: #0f1117;
  border: 1px solid #252840;
  color: #c9cde8;
  border-radius: 6px;
  padding: 6px 9px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: #7b6cf6; }
textarea { resize: vertical; min-height: 64px; font-family: monospace; font-size: 12px; }
select option { background: #181a2a; }

.checkbox-row {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; color: #888ab0; cursor: pointer;
}
.checkbox-row input { width: 14px; height: 14px; accent-color: #7b6cf6; cursor: pointer; }

.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.modal-actions .btn { flex: 1; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">⚡</span>
  <span class="title">Request <span>Mocker</span></span>
  <span class="count" id="count"></span>
  <label class="toggle" title="Enable / disable all mocks">
    <input type="checkbox" id="globalToggle">
    <span class="track"></span>
  </label>
</div>

<div class="list" id="ruleList">
  <div class="empty" id="empty">
    <div class="empty-icon">⚡</div>
    <div>No mock rules yet</div>
    <div style="font-size:11px;color:#2e3050">Add a rule to start intercepting requests</div>
  </div>
</div>

<div class="footer">
  <button class="btn btn-ghost" id="btnExport">Export</button>
  <button class="btn btn-ghost" id="btnImport">Import</button>
  <button class="btn btn-primary" id="btnAdd">+ Add Rule</button>
</div>

<!-- Add / Edit modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Mock Rule</div>

    <div class="field">
      <label class="label">Name (optional)</label>
      <input type="text" id="fName" placeholder="e.g. Mock user list">
    </div>

    <div class="row">
      <div class="field">
        <label class="label">Method</label>
        <select id="fMethod">
          <option value="*">ANY</option>
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="PATCH">PATCH</option>
          <option value="DELETE">DELETE</option>
          <option value="HEAD">HEAD</option>
        </select>
      </div>
      <div class="field">
        <label class="label">Status</label>
        <input type="number" id="fStatus" value="200" min="100" max="599">
      </div>
      <div class="field">
        <label class="label">Delay (ms)</label>
        <input type="number" id="fDelay" value="0" min="0">
      </div>
    </div>

    <div class="field">
      <label class="label">URL Pattern</label>
      <input type="text" id="fUrl" placeholder="/api/users  or  https://api.example.com/.*">
    </div>

    <div class="field">
      <label class="checkbox-row">
        <input type="checkbox" id="fRegex"> Treat as RegExp
      </label>
    </div>

    <div class="field">
      <label class="label">Response Body</label>
      <textarea id="fBody" placeholder='{"data": [], "ok": true}'></textarea>
    </div>

    <div class="field">
      <label class="label">Response Headers (JSON)</label>
      <textarea id="fHeaders" style="min-height:48px" placeholder='{"Content-Type": "application/json"}'></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancel">Cancel</button>
      <button class="btn btn-primary" id="btnSave">Save Rule</button>
    </div>
  </div>
</div>

<script>
'use strict';

let rules = [];
let enabled = true;
let editId = null;

const $ = (id) => document.getElementById(id);
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Storage ────────────────────────────────────────────────────────────────
function load(cb) {
  chrome.storage.local.get({ rules: [], enabled: true }, (d) => {
    rules = d.rules;
    enabled = d.enabled;
    cb?.();
  });
}
function save(cb) {
  chrome.storage.local.set({ rules, enabled }, cb);
}

// ── Rendering ──────────────────────────────────────────────────────────────
function methodBadge(m) {
  const cls = { GET:'m-GET', POST:'m-POST', PUT:'m-PUT', DELETE:'m-DELETE', PATCH:'m-PATCH', '*':'m-ANY' };
  return `<span class="badge ${cls[m] ?? 'm-ANY'}">${m === '*' ? 'ANY' : m}</span>`;
}

function statusBadge(code) {
  const n = parseInt(code);
  const cls = n >= 500 ? 's-err' : n >= 400 ? 's-warn' : 's-ok';
  return `<span class="status ${cls}">${n}</span>`;
}

function render() {
  $('globalToggle').checked = enabled;

  const active = rules.filter((r) => r.enabled).length;
  $('count').textContent = rules.length ? `${active}/${rules.length} active` : '';

  const list = $('ruleList');
  list.querySelectorAll('.rule').forEach((el) => el.remove());

  if (!rules.length) {
    $('empty').style.display = '';
    return;
  }
  $('empty').style.display = 'none';

  rules.forEach((rule) => {
    const el = document.createElement('div');
    el.className = 'rule' + (rule.enabled ? '' : ' disabled');
    el.innerHTML = `
      <label class="toggle" style="width:30px;height:17px">
        <input type="checkbox" class="rule-toggle" data-id="${rule.id}" ${rule.enabled ? 'checked' : ''}>
        <span class="track"></span>
      </label>
      <div class="rule-body">
        <div class="rule-name">${esc(rule.name || rule.urlPattern)}</div>
        <div class="rule-meta">
          ${methodBadge(rule.method)}
          ${statusBadge(rule.statusCode)}
          ${rule.delay ? `<span class="meta-text">⏱ ${rule.delay}ms</span>` : ''}
          ${rule.isRegex ? '<span class="meta-text">regex</span>' : ''}
        </div>
        <div class="rule-url">${esc(rule.urlPattern)}</div>
      </div>
      <div class="rule-actions">
        <button class="icon-btn edit-btn" data-id="${rule.id}" title="Edit">✏️</button>
        <button class="icon-btn danger del-btn" data-id="${rule.id}" title="Delete">🗑</button>
      </div>
    `;

    el.querySelector('.rule-toggle').addEventListener('change', (e) => {
      const r = rules.find((x) => x.id === e.target.dataset.id);
      if (r) { r.enabled = e.target.checked; save(render); }
    });
    el.querySelector('.edit-btn').addEventListener('click', (e) => openModal(e.currentTarget.dataset.id));
    el.querySelector('.del-btn').addEventListener('click', (e) => {
      if (confirm('Delete this rule?')) {
        rules = rules.filter((r) => r.id !== e.currentTarget.dataset.id);
        save(render);
      }
    });

    list.appendChild(el);
  });
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(id) {
  editId = id ?? null;
  const rule = id ? rules.find((r) => r.id === id) : null;

  $('modalTitle').textContent = id ? 'Edit Mock Rule' : 'New Mock Rule';
  $('fName').value    = rule?.name ?? '';
  $('fMethod').value  = rule?.method ?? 'GET';
  $('fStatus').value  = rule?.statusCode ?? 200;
  $('fDelay').value   = rule?.delay ?? 0;
  $('fUrl').value     = rule?.urlPattern ?? '';
  $('fRegex').checked = rule?.isRegex ?? false;
  $('fBody').value    = rule?.responseBody ?? '';
  $('fHeaders').value = rule?.responseHeaders ?? '{"Content-Type": "application/json"}';

  $('overlay').classList.add('open');
  setTimeout(() => $('fUrl').focus(), 50);
}

function closeModal() {
  $('overlay').classList.remove('open');
  editId = null;
}

function saveModal() {
  const urlPattern = $('fUrl').value.trim();
  if (!urlPattern) { $('fUrl').focus(); return; }

  const existing = editId ? rules.find((r) => r.id === editId) : null;
  const rule = {
    id:              editId ?? uid(),
    enabled:         existing?.enabled ?? true,
    name:            $('fName').value.trim(),
    method:          $('fMethod').value,
    statusCode:      parseInt($('fStatus').value) || 200,
    delay:           parseInt($('fDelay').value) || 0,
    urlPattern,
    isRegex:         $('fRegex').checked,
    responseBody:    $('fBody').value,
    responseHeaders: $('fHeaders').value.trim(),
  };

  if (editId) {
    const idx = rules.findIndex((r) => r.id === editId);
    if (idx >= 0) rules[idx] = rule; else rules.push(rule);
  } else {
    rules.push(rule);
  }

  save(render);
  closeModal();
}

// ── Event wiring ───────────────────────────────────────────────────────────
$('globalToggle').addEventListener('change', (e) => { enabled = e.target.checked; save(render); });
$('btnAdd').addEventListener('click', () => openModal());
$('btnCancel').addEventListener('click', closeModal);
$('btnSave').addEventListener('click', saveModal);
$('overlay').addEventListener('click', (e) => { if (e.target === $('overlay')) closeModal(); });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.ctrlKey && $('overlay').classList.contains('open')) saveModal();
});

$('btnExport').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify({ rules }, null, 2));
  a.download = 'request-mocker-rules.json';
  a.click();
});

$('btnImport').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data.rules)) {
          rules = rules.concat(data.rules);
          save(render);
        } else {
          alert('Invalid file: expected { rules: [...] }');
        }
      } catch {
        alert('Invalid JSON file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
});

load(render);
</script>
</body>
</html>
